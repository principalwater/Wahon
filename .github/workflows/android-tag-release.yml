name: Android Tag Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android APK
        run: ./gradlew :composeApp:assembleDebug

      - name: Prepare release assets
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          SHA="${GITHUB_SHA::7}"
          mkdir -p dist
          APK_NAME="Wahon-${TAG}-${SHA}-debug.apk"
          cp composeApp/build/outputs/apk/debug/composeApp-debug.apk "dist/${APK_NAME}"
          sha256sum "dist/${APK_NAME}" > "dist/${APK_NAME}.sha256"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Wahon ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-beta.') }}
          generate_release_notes: true
          files: |
            dist/*.apk
            dist/*.sha256
